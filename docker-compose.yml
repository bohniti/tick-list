services:
  db:
    image: postgis/postgis:17-3.5
    environment:
      POSTGRES_USER: tick_list
      POSTGRES_PASSWORD: secret
      POSTGRES_DB: tick_list
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tick_list"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
